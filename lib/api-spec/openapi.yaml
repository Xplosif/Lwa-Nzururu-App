openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Institut Lwa-Nzururu - Système de gestion scolaire
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: classes
    description: Class management
  - name: subjects
    description: Subject management
  - name: students
    description: Student management
  - name: grades
    description: Grade management
  - name: stats
    description: Statistics dashboard
  - name: archives
    description: Annual archives
  - name: reports
    description: PDF report generation
  - name: messages
    description: In-app messaging
  - name: profile
    description: User profile management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/setup-account:
    post:
      operationId: setupAccount
      tags: [auth]
      summary: Setup account on first login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupAccountBody"
      responses:
        "200":
          description: Account setup complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (teachers and secretaries)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (Proviseur only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created with temporary credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUserResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user (role, class assignment)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List all classes
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Class"

    post:
      operationId: createClass
      tags: [classes]
      summary: Create a class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassBody"
      responses:
        "201":
          description: Class created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

  /classes/{id}:
    get:
      operationId: getClass
      tags: [classes]
      summary: Get class by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateClass
      tags: [classes]
      summary: Update class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassBody"
      responses:
        "200":
          description: Class updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

    delete:
      operationId: deleteClass
      tags: [classes]
      summary: Delete class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /subjects:
    get:
      operationId: listSubjects
      tags: [subjects]
      summary: List all subjects
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"

    post:
      operationId: createSubject
      tags: [subjects]
      summary: Create a subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubjectBody"
      responses:
        "201":
          description: Subject created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

  /subjects/{id}:
    patch:
      operationId: updateSubject
      tags: [subjects]
      summary: Update subject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubjectBody"
      responses:
        "200":
          description: Subject updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"

    delete:
      operationId: deleteSubject
      tags: [subjects]
      summary: Delete subject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List students
      parameters:
        - name: classId
          in: query
          schema:
            type: ["integer", "null"]
        - name: academicYear
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"

    post:
      operationId: createStudent
      tags: [students]
      summary: Enroll a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Student enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentCreated"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentBody"
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /grades:
    get:
      operationId: listGrades
      tags: [grades]
      summary: List grades
      parameters:
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: classId
          in: query
          schema:
            type: ["integer", "null"]
        - name: subjectId
          in: query
          schema:
            type: ["integer", "null"]
        - name: academicYear
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Grade"

    post:
      operationId: createGrade
      tags: [grades]
      summary: Enter a grade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGradeBody"
      responses:
        "201":
          description: Grade entered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grade"

  /grades/{id}:
    patch:
      operationId: updateGrade
      tags: [grades]
      summary: Update a grade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGradeBody"
      responses:
        "200":
          description: Grade updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grade"

    delete:
      operationId: deleteGrade
      tags: [grades]
      summary: Delete grade
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard statistics for Proviseur
      parameters:
        - name: academicYear
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/class/{classId}:
    get:
      operationId: getClassStats
      tags: [stats]
      summary: Get statistics for a specific class
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
        - name: academicYear
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Class statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassStats"

  /archives:
    get:
      operationId: listArchives
      tags: [archives]
      summary: List archived academic years
      responses:
        "200":
          description: List of archives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Archive"

    post:
      operationId: createArchive
      tags: [archives]
      summary: Archive an academic year
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArchiveBody"
      responses:
        "201":
          description: Archive created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Archive"

  /archives/{id}:
    get:
      operationId: getArchive
      tags: [archives]
      summary: Get archive by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Archive found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Archive"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/bulletin/{studentId}:
    get:
      operationId: generateBulletin
      tags: [reports]
      summary: Generate student bulletin PDF
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: academicYear
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bulletin data for PDF generation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulletinData"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /reports/palmares/{classId}:
    get:
      operationId: generatePalmares
      tags: [reports]
      summary: Generate class palmares (rankings) PDF data
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
        - name: academicYear
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Palmares data for PDF generation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalmaresData"

  /reports/signature:
    get:
      operationId: getSignatureInfo
      tags: [reports]
      summary: Get proviseur signature info for PDF
      responses:
        "200":
          description: Signature information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureInfo"

    post:
      operationId: updateSignatureInfo
      tags: [reports]
      summary: Update proviseur signature info
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSignatureBody"
      responses:
        "200":
          description: Signature updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureInfo"

  /course-assignments:
    get:
      operationId: listCourseAssignments
      tags: [subjects]
      summary: List course assignments (teacher-subject-class links)
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseAssignment"

    post:
      operationId: createCourseAssignment
      tags: [subjects]
      summary: Assign a teacher to a subject-class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseAssignmentBody"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseAssignment"

  /course-assignments/{id}:
    delete:
      operationId: deleteCourseAssignment
      tags: [subjects]
      summary: Remove a course assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /deliberations:
    get:
      operationId: listDeliberations
      tags: [deliberations]
      summary: List deliberations
      parameters:
        - name: classId
          in: query
          schema:
            type: integer
            nullable: true
        - name: academicYear
          in: query
          schema:
            type: string
            nullable: true
      responses:
        "200":
          description: List of deliberations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deliberation"

    post:
      operationId: createDeliberation
      tags: [deliberations]
      summary: Create a deliberation for a class+semester
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeliberationBody"
      responses:
        "201":
          description: Deliberation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deliberation"

  /deliberations/{id}:
    get:
      operationId: getDeliberation
      tags: [deliberations]
      summary: Get a deliberation with students and bonuses
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deliberation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliberationDetail"

  /deliberations/{id}/approve:
    post:
      operationId: approveDeliberation
      tags: [deliberations]
      summary: Approve a deliberation (Proviseur)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deliberation approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deliberation"

  /deliberations/{id}/bonus:
    post:
      operationId: setDeliberationBonus
      tags: [deliberations]
      summary: Set bonus points for a student in a deliberation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetDeliberationBonusBody"
      responses:
        "200":
          description: Bonus updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliberationBonusEntry"

  /auth/profile:
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: Get messages in a conversation
      parameters:
        - name: withUserId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/unread-count:
    get:
      operationId: getUnreadCount
      tags: [messages]
      summary: Get count of unread messages
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnreadCount"

  /parent/bulletin:
    get:
      operationId: getParentBulletin
      tags: [deliberations]
      summary: Get the authenticated parent's child bulletin (only if deliberation approved)
      parameters:
        - name: academicYear
          in: query
          required: true
          schema:
            type: string
        - name: semester
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Child bulletin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParentBulletinResult"
        "403":
          description: Results not yet approved
        "404":
          description: No child linked to this account

components:
  schemas:
    Message:
      type: object
      properties:
        id:
          type: integer
        fromUserId:
          type: integer
        toUserId:
          type: integer
        content:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
        fromFullName:
          type: string
      required:
        - id
        - fromUserId
        - toUserId
        - content
        - isRead
        - createdAt
        - fromFullName

    SendMessageBody:
      type: object
      properties:
        toUserId:
          type: integer
        content:
          type: string
      required:
        - toUserId
        - content

    UnreadCount:
      type: object
      properties:
        count:
          type: integer
      required:
        - count

    UpdateProfileBody:
      type: object
      properties:
        fullName:
          type: string
        currentPassword:
          type: string
        newPassword:
          type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        requiresSetup:
          type: boolean
      required:
        - user
        - requiresSetup

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required:
        - currentPassword
        - newPassword

    SetupAccountBody:
      type: object
      properties:
        tempUsername:
          type: string
        tempPassword:
          type: string
        newUsername:
          type: string
        newPassword:
          type: string
        fullName:
          type: string
      required:
        - tempUsername
        - tempPassword
        - newUsername
        - newPassword
        - fullName

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        role:
          type: string
          enum: [proviseur, enseignant, titulaire, secretaire, parent]
        classId:
          type: ["integer", "null"]
        className:
